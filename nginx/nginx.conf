version: '3.8'

services:
  flask_app:
    build: .
    container_name: sentinel_backend
    restart: always
    environment:
      - REDIS_HOST=redis_db
    # Port 5000 ab bahar se access karne ki zaroorat nahi, Nginx handle karega

  redis_db:
    image: "redis:alpine"
    container_name: sentinel_redis
    restart: always

  nginx_proxy:
    image: nginx:alpine
    container_name: sentinel_proxy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - flask_app
